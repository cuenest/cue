<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f6f4ee" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#12110e" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="Local-first notes, a one-at-a-time queue, and a master calendar — encrypted and synced across your devices with no account." />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/favicon.png" sizes="192x192" type="image/png" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Cue" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Cue</title>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('cue-theme');
          if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Splash: inline (no JS/bundle needed) so it paints instantly while the
         app loads. The C draws itself, the cue-dot pops in, then pulses until
         React mounts and fades it out (see main.tsx). Colors are hardcoded
         because the theme CSS lives in the bundle that hasn't loaded yet. */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: #f6f4ee;
        transition: opacity 0.35s ease;
      }
      html.dark #splash {
        background: #12110e;
      }
      #splash.done {
        opacity: 0;
        pointer-events: none;
      }
      #splash svg {
        width: 92px;
        height: 92px;
      }
      #splash .c {
        fill: none;
        stroke: #1d1b16;
        stroke-width: 44;
        stroke-linecap: round;
        stroke-dasharray: 100;
        stroke-dashoffset: 100;
        animation: splash-draw 0.8s cubic-bezier(0.65, 0, 0.35, 1) 0.15s forwards;
      }
      html.dark #splash .c {
        stroke: #ece7da;
      }
      #splash .dot {
        fill: #ffd21e;
        stroke: #1d1b16;
        stroke-width: 10;
        transform-origin: 356px 256px;
        transform: scale(0);
        animation:
          splash-pop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) 0.9s forwards,
          splash-pulse 1.6s ease-in-out 1.6s infinite;
      }
      html.dark #splash .dot {
        stroke: #ece7da;
      }
      #splash .word {
        font-family: 'IBM Plex Mono', ui-monospace, monospace;
        font-size: 11px;
        letter-spacing: 0.35em;
        text-transform: uppercase;
        color: #1d1b16;
        opacity: 0;
        animation: splash-fade-in 0.4s ease 1.1s forwards;
      }
      html.dark #splash .word {
        color: #ece7da;
      }
      @keyframes splash-draw {
        to {
          stroke-dashoffset: 0;
        }
      }
      @keyframes splash-pop {
        to {
          transform: scale(1);
        }
      }
      @keyframes splash-pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.18);
        }
      }
      @keyframes splash-fade-in {
        to {
          opacity: 1;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #splash .c {
          animation: none;
          stroke-dashoffset: 0;
        }
        #splash .dot {
          animation: none;
          transform: scale(1);
        }
        #splash .word {
          animation: none;
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="splash" aria-hidden="true">
      <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
        <path class="c" d="M 352 168 A 128 128 0 1 0 352 344" pathLength="100" />
        <circle class="dot" cx="356" cy="256" r="30" />
      </svg>
      <span class="word">cue</span>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
