# Render blueprint for Cue: a sync hub (Node web service) + the web app (static site).
# Deploy: push this repo, then "New > Blueprint" in Render and point it here.
#
# Zero-knowledge holds end to end: the hub only ever relays/stores ciphertext.
# Both services run on Render's free tier. See the durability note on the hub.
services:
  # ---- Sync hub -------------------------------------------------------------
  # Relays encrypted Yjs updates over WebSocket and stores encrypted file
  # chunks over HTTP (same port). Reads PORT (set by Render) and CUE_HUB_DATA.
  - type: web
    name: cue-hub
    runtime: node
    plan: free
    # Filtered install: only the hub's dependency subtree, so Electron (a devDep
    # of @cue/desktop) is never downloaded — that download often fails/times out
    # on free instances and would sink the whole build.
    # No `corepack enable` — Render's /usr/bin is read-only (it errors EROFS) and
    # pnpm is already provisioned from the package.json "packageManager" field.
    buildCommand: pnpm install --frozen-lockfile --filter @cue/hub...
    startCommand: pnpm --filter @cue/hub start
    envVars:
      # /tmp is guaranteed writable on Render; /var/data is not, unless a disk is
      # mounted there. Ephemeral is fine — devices hold full replicas and
      # re-push on reconnect; only unpinned files with no online holder are lost.
      - key: CUE_HUB_DATA
        value: /tmp/cue-hub
    # For durable storage: move to a paid instance, uncomment the disk, and set
    # CUE_HUB_DATA above to a path under mountPath (e.g. /var/data/cue-hub):
    # disk:
    #   name: cue-hub-data
    #   mountPath: /var/data
    #   sizeGB: 1

  # ---- Web app --------------------------------------------------------------
  # Static SPA. Built with the hub's public host injected as the default sync
  # target; the app prefixes wss:// (see resolveDefaultHub in sync/manager.ts).
  - type: web
    name: cue-web
    runtime: static
    buildCommand: pnpm install --frozen-lockfile --filter @cue/web... && pnpm --filter @cue/web build
    staticPublishPath: apps/web/dist
    envVars:
      - key: VITE_DEFAULT_HUB
        fromService:
          type: web
          name: cue-hub
          property: host
    routes:
      # SPA + hash-router fallback: serve index.html for any unknown path.
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      # The service worker must be allowed to control the whole origin.
      - path: /cue-sw.js
        name: Service-Worker-Allowed
        value: /
